services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: skills-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - skills-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    container_name: skills-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    volumes:
      - kibana-data:/usr/share/kibana/data
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - skills-network

  manticore:
    image: manticoresearch/manticore:28.4.4
    container_name: skills-manticore
    ports:
      - "9306:9306"
      - "9308:9308"
    volumes:
      - manticore-data:/var/lib/manticore
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "mysql -h127.0.0.1 -P9306 -e 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - skills-network

volumes:
  elasticsearch-data:
  kibana-data:
  manticore-data:

networks:
  skills-network:
    driver: bridge
